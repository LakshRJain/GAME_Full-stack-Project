name: Full Stack CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ------------------ Backend CI ------------------
  backend:
    name: Backend CI (Node.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: game-matchmaking-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: game-matchmaking-backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run Linter
        run: npm run lint --if-present

      - name: Run Tests
        run: npm test --if-present

      - name: Build App
        run: npm run build --if-present

  # ------------------ Frontend CI ------------------
  frontend:
    name: Frontend CI (Flutter)
    runs-on: ubuntu-latest
    needs: backend  

    defaults:
      run:
        working-directory: game_matchmaking_frontend/game

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.6"
          channel: stable

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk
