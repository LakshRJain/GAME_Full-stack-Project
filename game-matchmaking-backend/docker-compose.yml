version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: game_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_server
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: game_backend
    restart: always
    ports:
      - "5000:5000"
      - "5001:5001" 
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@localhost:5432/matchmakingdb
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretkey
      - PORT=5000
      - SERVER_PORT=5001
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
